# Deploy the static site to Firebase Hosting on every push to main.
#
# Builds straight from the committed data JSONs (web/public/data/*.json) — no
# model run needed — and deploys. The scheduled data refresh lives in
# update.yml; that job's gaffer-bot commits are made with the default
# GITHUB_TOKEN, and GitHub deliberately does NOT trigger workflows from
# GITHUB_TOKEN pushes, so this never loops. update.yml still deploys its own
# refresh at the end, so scheduled updates go live too.
name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

# A newer push supersedes an in-flight deploy of older code.
concurrency:
  group: deploy-hosting
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Build static site
        working-directory: web
        run: |
          # Same npm ci -> npm install self-heal as update.yml (Windows lockfile
          # vs Linux runner can disagree on bundled wasm fallback versions).
          npm ci || npm install
          npm run build

      - name: Diagnose SA auth (TEMP)
        if: ${{ env.SA != '' }}
        run: |
          printf '%s' "$SA" > "$RUNNER_TEMP/sa.json"
          # The raw SA JWT->token exchange already proved the key is valid (HTTP 200),
          # yet firebase-tools reports "Failed to authenticate". Run the real deploy
          # with --debug and dump firebase-debug.log to see which auth path it takes
          # and the exact error it hits.
          echo "::group::google/firebase env (values masked)"
          env | grep -iE "GOOGLE|GCLOUD|FIREBASE|CLOUDSDK" | sed 's/=.*/=<set>/' || echo "(none)"
          echo "::endgroup::"
          npx --yes firebase-tools@15.22.1 deploy --only hosting:gaffer-wc26 \
            --project agentic-ai-487000 --non-interactive --debug || true
          echo "::group::firebase-debug.log (tail)"
          tail -80 firebase-debug.log 2>/dev/null || echo "no firebase-debug.log in $(pwd)"
          echo "::endgroup::"
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json

      - name: Deploy to Firebase Hosting
        if: ${{ env.SA != '' }}
        run: |
          printf '%s' "$SA" > "$RUNNER_TEMP/sa.json"
          # Two independent failure modes have broken this deploy; guard both:
          #  1. @latest is a moving target. npm flipped the `latest` tag to a new
          #     version (15.22.3) whose tarball had not propagated yet, so every
          #     attempt hit "No matching version found". Pin to a known-good,
          #     installable version; bump FIREBASE_TOOLS deliberately after a green run.
          #  2. firebase-tools intermittently fails the service-account token
          #     exchange with a generic "Failed to authenticate, have you run
          #     firebase login?" when Google's OAuth endpoint blips. Retry with
          #     backoff (30/60/90/120s, ~5min total) to outlast a multi-minute blip.
          FIREBASE_TOOLS=15.22.1
          ok=0
          for attempt in 1 2 3 4 5; do
            if npx --yes firebase-tools@"$FIREBASE_TOOLS" deploy --only hosting:gaffer-wc26 \
                 --project agentic-ai-487000 --non-interactive; then
              ok=1; break
            fi
            if [ "$attempt" -lt 5 ]; then
              echo "::warning::Firebase deploy attempt $attempt failed; retrying in $((attempt*30))s"
              sleep $((attempt * 30))
            fi
          done
          [ "$ok" = 1 ] || { echo "::error::Firebase deploy failed after 5 attempts"; exit 1; }
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
