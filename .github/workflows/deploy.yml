# Deploy the static site to Firebase Hosting after CI passes on main.
#
# Gated on the CI workflow (ruff + pytest + lint + typecheck + build): a push
# to main only deploys once its CI run completes green, and we check out the
# exact commit that CI validated (workflow_run.head_sha). Builds straight from
# the committed data JSONs (web/public/data/*.json) — no model run needed.
# The scheduled data refresh lives in update.yml; that job's gaffer-bot
# commits are made with the default GITHUB_TOKEN, and GitHub deliberately does
# NOT trigger workflows from GITHUB_TOKEN pushes, so this never loops.
# update.yml still deploys its own refresh at the end, so scheduled updates go
# live too. workflow_dispatch remains as a manual escape hatch (deploys HEAD).
name: Deploy site

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: read

# A newer push supersedes an in-flight deploy of older code.
concurrency:
  group: deploy-hosting
  cancel-in-progress: true

jobs:
  deploy:
    # Deploy on manual dispatch, or when CI succeeded on main (PR CI runs have
    # head_branch = the PR branch, so they're filtered out here).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    env:
      SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
    steps:
      - uses: actions/checkout@v5
        with:
          # Deploy exactly what CI validated, not whatever main has moved to.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-node@v5
        with:
          # Pin the exact patch, not floating "22". Node 22.23.0 ships an undici
          # regression that makes firebase-tools' OAuth token fetch fail with
          # "Premature close" -> "Failed to authenticate" (firebase-tools#10692).
          # 22.22.3 is the last patch that deploys cleanly. Re-test before bumping.
          node-version: "22.22.3"
      - name: Build static site
        working-directory: web
        run: |
          # Same npm ci -> npm install self-heal as update.yml (Windows lockfile
          # vs Linux runner can disagree on bundled wasm fallback versions).
          npm ci || npm install
          npm run build

      - name: Deploy to Firebase Hosting
        if: ${{ env.SA != '' }}
        run: |
          printf '%s' "$SA" > "$RUNNER_TEMP/sa.json"
          # Pin firebase-tools, do not use @latest: npm once flipped the `latest`
          # tag to a version (15.22.3) whose tarball had not propagated, so every
          # attempt hit "No matching version found". Bump FIREBASE_TOOLS deliberately
          # after a green run. (The "Failed to authenticate / Premature close" auth
          # break was a Node 22.23.0 regression, fixed by the node-version pin above.)
          # The retry still rides out an occasional transient OAuth blip.
          FIREBASE_TOOLS=15.22.1
          ok=0
          for attempt in 1 2 3 4 5; do
            if npx --yes firebase-tools@"$FIREBASE_TOOLS" deploy --only hosting:gaffer-wc26 \
                 --project agentic-ai-487000 --non-interactive; then
              ok=1; break
            fi
            if [ "$attempt" -lt 5 ]; then
              echo "::warning::Firebase deploy attempt $attempt failed; retrying in $((attempt*30))s"
              sleep $((attempt * 30))
            fi
          done
          [ "$ok" = 1 ] || { echo "::error::Firebase deploy failed after 5 attempts"; exit 1; }
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
