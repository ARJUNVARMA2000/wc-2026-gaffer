# Deploy the static site to Firebase Hosting on every push to main.
#
# Builds straight from the committed data JSONs (web/public/data/*.json) — no
# model run needed — and deploys. The scheduled data refresh lives in
# update.yml; that job's gaffer-bot commits are made with the default
# GITHUB_TOKEN, and GitHub deliberately does NOT trigger workflows from
# GITHUB_TOKEN pushes, so this never loops. update.yml still deploys its own
# refresh at the end, so scheduled updates go live too.
name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

# A newer push supersedes an in-flight deploy of older code.
concurrency:
  group: deploy-hosting
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Build static site
        working-directory: web
        run: |
          # Same npm ci -> npm install self-heal as update.yml (Windows lockfile
          # vs Linux runner can disagree on bundled wasm fallback versions).
          npm ci || npm install
          npm run build

      - name: Deploy to Firebase Hosting
        if: ${{ env.SA != '' }}
        run: |
          set -o pipefail
          printf '%s' "$SA" > "$RUNNER_TEMP/sa.json"
          # --- TEMP auth diagnostics (remove once deploy is green) ---
          # Print only non-secret SA fields so we can tell whether the key JSON is
          # well-formed and which account/key it points at. Never echo private_key.
          echo "::group::SA key sanity (no secrets)"
          node -e '
            const fs=require("fs");
            const p=process.env.GOOGLE_APPLICATION_CREDENTIALS;
            try {
              const j=JSON.parse(fs.readFileSync(p,"utf8"));
              console.log("type:",j.type);
              console.log("project_id:",j.project_id);
              console.log("client_email:",j.client_email);
              console.log("private_key_id:",j.private_key_id);
              console.log("has_private_key:",!!j.private_key,"len:",(j.private_key||"").length);
              console.log("private_key_starts:",(j.private_key||"").slice(0,27));
            } catch(e){ console.log("PARSE ERROR:",e.message); }
          '
          echo "::endgroup::"
          npx --yes firebase-tools@15.22.1 deploy --only hosting:gaffer-wc26 \
            --project agentic-ai-487000 --non-interactive --debug 2>&1 | tail -60
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
