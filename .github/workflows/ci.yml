# CI: lint + test the Python model, and lint + typecheck + build the website.
# Read-only and secret-free — deploys live in deploy.yml / update.yml.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read

# A newer push to the same ref supersedes an in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  model:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: model
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            model/requirements.txt
            model/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff
        run: ruff check src tests

      - name: Pytest
        run: pytest -q

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          # Same pin as deploy.yml/update.yml (Node 22.23.0 undici regression);
          # keep CI building on exactly what the deploy workflows ship with.
          node-version: "22.22.3"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: |
          # Same npm ci -> npm install self-heal as update.yml (Windows lockfile
          # vs Linux runner can disagree on bundled wasm fallback versions).
          npm ci || npm install

      - name: ESLint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build static site
        run: npm run build
