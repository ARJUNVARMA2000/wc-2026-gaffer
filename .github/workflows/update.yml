# Live forecast refresh + deploy to Firebase Hosting.
# Every 6 hours: re-pull results, re-scrape squad values, recompute, rebuild the
# static site, commit the data, and (if the FIREBASE_SERVICE_ACCOUNT secret is set)
# deploy to https://gaffer-wc26.web.app.
#
# To enable the automated deploy, add one GitHub secret — see DEPLOY.md:
#   gh secret set FIREBASE_SERVICE_ACCOUNT < key.json
name: Update forecast

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Refresh data (results + squad values + market scorecard, 50k sims)
        working-directory: model
        run: |
          pip install -r requirements.txt
          PYTHONPATH=src python -m wc_model.pipeline --download --refresh-values --scorecard --kalshi-refresh --sims 50000

      - name: Commit refreshed projections
        run: |
          git config user.name "gaffer-bot"
          git config user.email "bot@users.noreply.github.com"
          git add model/data/output web/public/data model/data/raw/transfermarkt_values.json model/data/raw/kalshi_wcgame.json
          git commit -m "data: auto-refresh projections" || echo "no changes"
          git push || echo "nothing to push"

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Build static site
        working-directory: web
        run: |
          # `npm ci` is the strict, reproducible fast path. It can fail when the
          # committed lock (maintained on Windows) and the Linux runner disagree on
          # the versions bundled inside platform-specific wasm fallback packages
          # (e.g. @emnapi/* inside @tailwindcss/oxide-wasm32-wasi). Those bundled
          # versions are only knowable from a real Linux install, so fall back to
          # `npm install`, which reconciles the lock instead of hard-failing.
          npm ci || npm install
          npm run build

      - name: Deploy to Firebase Hosting
        if: ${{ env.SA != '' }}
        run: |
          printf '%s' "$SA" > "$RUNNER_TEMP/sa.json"
          # Two independent failure modes have broken this deploy; guard both:
          #  1. @latest is a moving target. npm flipped the `latest` tag to a new
          #     version (15.22.3) whose tarball had not propagated yet, so every
          #     attempt hit "No matching version found". Pin to a known-good,
          #     installable version; bump FIREBASE_TOOLS deliberately after a green run.
          #  2. firebase-tools intermittently fails the service-account token
          #     exchange with a generic "Failed to authenticate, have you run
          #     firebase login?" when Google's OAuth endpoint blips. Retry with
          #     backoff (30/60/90/120s, ~5min total) to outlast a multi-minute blip.
          FIREBASE_TOOLS=15.22.1
          ok=0
          for attempt in 1 2 3 4 5; do
            if npx --yes firebase-tools@"$FIREBASE_TOOLS" deploy --only hosting:gaffer-wc26 \
                 --project agentic-ai-487000 --non-interactive; then
              ok=1; break
            fi
            if [ "$attempt" -lt 5 ]; then
              echo "::warning::Firebase deploy attempt $attempt failed; retrying in $((attempt*30))s"
              sleep $((attempt * 30))
            fi
          done
          [ "$ok" = 1 ] || { echo "::error::Firebase deploy failed after 5 attempts"; exit 1; }
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
