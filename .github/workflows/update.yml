# Live forecast refresh.
# Re-pulls international results, recomputes ratings + simulation, and commits the
# updated JSON. If the repo is connected to Vercel, the commit triggers a redeploy.
#
# Setup needed before this runs for real:
#   - push this project to a GitHub repo
#   - (optional) connect the repo to Vercel for auto-deploy on push
name: Update forecast

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours during the tournament
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install model deps
        working-directory: model
        run: pip install -r requirements.txt

      - name: Run pipeline (latest results + squad values, 50k sims)
        working-directory: model
        run: PYTHONPATH=src python -m wc_model.pipeline --download --refresh-values --sims 50000

      - name: Commit refreshed projections
        run: |
          git config user.name "gaffer-bot"
          git config user.email "bot@users.noreply.github.com"
          git add model/data/output web/public/data model/data/raw/transfermarkt_values.json
          # No [skip ci]: the push must trigger Vercel to rebuild with fresh data.
          # This workflow only runs on schedule/dispatch, so the push can't loop it.
          git commit -m "data: auto-refresh projections" || echo "no changes"
          git push
