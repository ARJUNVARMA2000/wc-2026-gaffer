# Live forecast refresh + deploy to Firebase Hosting.
#
# Runs HOURLY. Every run re-pulls the martj42 results and recomputes the
# forecast; at 00/06/12/18 UTC — or when dispatched with full=true — it is a
# FULL refresh that also re-scrapes Transfermarkt squad values and re-pulls
# Kalshi market prices. A material-change gate (wc_model.material_diff) then
# diffs the regenerated JSON against HEAD ignoring volatile timestamp fields
# (meta.lastUpdated, history.generatedAt, ...): the commit, site build and
# deploy steps only run when a probability/result actually moved, so no-news
# hourly runs are cheap no-ops that don't spam the git history or Firebase.
#
# To enable the automated deploy, add one GitHub secret — see DEPLOY.md:
#   gh secret set FIREBASE_SERVICE_ACCOUNT < key.json
name: Update forecast

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      full:
        description: "Full refresh: also re-scrape Transfermarkt values + Kalshi prices"
        type: boolean
        default: false

permissions:
  contents: write

# One refresh at a time: an hourly tick must not race an in-flight run's
# commit/deploy. Queue rather than cancel, so a manual run always completes.
concurrency:
  group: update-forecast
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Decide refresh flavor (full re-scrape every 6h or on demand)
        id: flavor
        run: |
          # FULL adds the Transfermarkt squad-value re-scrape + Kalshi price pull;
          # LIGHT (all other hourly runs) just re-pulls results and re-simulates.
          # 10# forces base ten so hours 08/09 aren't parsed as invalid octal.
          if [ "${{ inputs.full }}" = "true" ] || [ $(( 10#$(date -u +%H) % 6 )) -eq 0 ]; then
            echo "extra=--refresh-values --kalshi-refresh" >> "$GITHUB_OUTPUT"
            echo "flavor: full"
          else
            echo "extra=" >> "$GITHUB_OUTPUT"
            echo "flavor: light"
          fi

      - name: Refresh data (results + market scorecard, 50k sims)
        working-directory: model
        run: |
          pip install -r requirements.txt
          PYTHONPATH=src python -m wc_model.pipeline --download --scorecard ${{ steps.flavor.outputs.extra }} --sims 50000

      - name: Material-change gate (ignore volatile timestamp-only churn)
        id: gate
        run: PYTHONPATH=model/src python -m wc_model.material_diff

      - name: Commit refreshed projections
        if: ${{ steps.gate.outputs.material == 'true' }}
        run: |
          git config user.name "gaffer-bot"
          git config user.email "bot@users.noreply.github.com"
          git add model/data/output web/public/data model/data/raw/transfermarkt_values.json model/data/raw/kalshi_wcgame.json
          git commit -m "data: auto-refresh projections" || echo "no changes"
          git push || echo "nothing to push"

      - uses: actions/setup-node@v5
        if: ${{ steps.gate.outputs.material == 'true' }}
        with:
          # Pin the exact patch, not floating "22". Node 22.23.0 ships an undici
          # regression that makes firebase-tools' OAuth token fetch fail with
          # "Premature close" -> "Failed to authenticate" (firebase-tools#10692).
          # 22.22.3 is the last patch that deploys cleanly. Re-test before bumping.
          node-version: "22.22.3"
      - name: Build static site
        if: ${{ steps.gate.outputs.material == 'true' }}
        working-directory: web
        run: |
          # `npm ci` is the strict, reproducible fast path. It can fail when the
          # committed lock (maintained on Windows) and the Linux runner disagree on
          # the versions bundled inside platform-specific wasm fallback packages
          # (e.g. @emnapi/* inside @tailwindcss/oxide-wasm32-wasi). Those bundled
          # versions are only knowable from a real Linux install, so fall back to
          # `npm install`, which reconciles the lock instead of hard-failing.
          npm ci || npm install
          npm run build

      - name: Deploy to Firebase Hosting
        if: ${{ steps.gate.outputs.material == 'true' && env.SA != '' }}
        run: |
          printf '%s' "$SA" > "$RUNNER_TEMP/sa.json"
          # Pin firebase-tools, do not use @latest: npm once flipped the `latest`
          # tag to a version (15.22.3) whose tarball had not propagated, so every
          # attempt hit "No matching version found". Bump FIREBASE_TOOLS deliberately
          # after a green run. (The "Failed to authenticate / Premature close" auth
          # break was a Node 22.23.0 regression, fixed by the node-version pin above.)
          # The retry still rides out an occasional transient OAuth blip.
          FIREBASE_TOOLS=15.22.1
          ok=0
          for attempt in 1 2 3 4 5; do
            if npx --yes firebase-tools@"$FIREBASE_TOOLS" deploy --only hosting:gaffer-wc26 \
                 --project agentic-ai-487000 --non-interactive; then
              ok=1; break
            fi
            if [ "$attempt" -lt 5 ]; then
              echo "::warning::Firebase deploy attempt $attempt failed; retrying in $((attempt*30))s"
              sleep $((attempt * 30))
            fi
          done
          [ "$ok" = 1 ] || { echo "::error::Firebase deploy failed after 5 attempts"; exit 1; }
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
